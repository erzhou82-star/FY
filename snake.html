<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>肥杨贪吃蛇</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0e27;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        touch-action: none;
    }
    .container {
        display: flex;
        gap: 20px;
        padding: 20px;
        background: #0f1419;
        border-radius: 16px;
        box-shadow: 0 0 30px rgba(0,255,255,0.2);
    }
    .game-area {
        position: relative;
    }
    canvas {
        display: block;
        background: linear-gradient(180deg, #0f1419, #1a1f2e);
        border: 2px solid #00ffff;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0,255,255,0.3);
        touch-action: none;
    }
    .panel {
        width: 240px;
        background: #1a1f2e;
        border-radius: 12px;
        padding: 20px;
        color: #ccc;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .panel h2 {
        text-align: center;
        color: #00ffff;
        font-size: 22px;
        letter-spacing: 2px;
        text-shadow: 0 0 10px #00ffff;
    }
    .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 16px;
    }
    .stat-label { color: #8899aa; }
    .stat-value { font-weight: bold; }
    .score { color: #00ff88; }
    .best  { color: #ffaa00; }
    .level { color: #ff00ff; }
    .speed { color: #00d9ff; }
    .status {
        text-align: center;
        font-size: 14px;
        padding: 6px;
        border-radius: 6px;
        background: #0f1419;
    }
    .controls {
        margin-top: auto;
        font-size: 13px;
        color: #667788;
    }
    .controls span { color: #00d9ff; }
    .btn-restart {
        background: transparent;
        border: 2px solid #00d2ff;
        color: #00d2ff;
        font-size: 18px;
        padding: 8px 0;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.2s;
        font-weight: bold;
        text-align: center;
    }
    .btn-restart:hover { background: #00d2ff22; }
    @media (max-width: 720px) {
        .container { flex-direction: column; align-items: center; }
        .panel { width: 100%; max-width: 360px; }
    }
</style>
</head>
<body>
<div class="container">
    <div class="game-area">
        <canvas id="gameCanvas" width="600" height="480"></canvas>
    </div>
    <div class="panel">
        <h2>🐍 肥杨贪吃蛇</h2>
        <div class="stat-row"><span class="stat-label">分数</span><span class="stat-value score" id="scoreDisplay">0</span></div>
        <div class="stat-row"><span class="stat-label">最高分</span><span class="stat-value best" id="bestDisplay">0</span></div>
        <div class="stat-row"><span class="stat-label">等级</span><span class="stat-value level" id="levelDisplay">1</span></div>
        <div class="stat-row"><span class="stat-label">速度</span><span class="stat-value speed" id="speedDisplay">⚡⚡</span></div>
        <div class="status" id="statusDisplay">🎮 游戏中</div>
        <div class="btn-restart" onclick="resetGame()">🔄 重新开始</div>
        <div class="controls">
            <div>⬆⬇⬅➡ / <span>W A S D</span> 移动</div>
            <div><span>Space</span> 暂停</div>
            <div><span>R</span> 重新开始</div>
            <div style="margin-top:6px;">📱 手机滑动控制</div>
        </div>
    </div>
</div>
<script>
// ============ 游戏核心 ============
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 30;
const ROWS = 24;
const CELL = 20; // 像素

let snake = [];
let food = { x: 0, y: 0 };
let direction = 0; // 0右 1下 2左 3上
let nextDirection = 0;
let score = 0;
let best = parseInt(localStorage.getItem('snakeBest')) || 0;
let level = 1;
let alive = true;
let paused = false;
let gameOver = false;
let moveInterval = 200;
let lastMoveTime = 0;
let animFrameId = null;
let startTime = 0;

// DOM 元素
const scoreEl = document.getElementById('scoreDisplay');
const bestEl = document.getElementById('bestDisplay');
const levelEl = document.getElementById('levelDisplay');
const speedEl = document.getElementById('speedDisplay');
const statusEl = document.getElementById('statusDisplay');

// 初始化
function initGame() {
    snake = [
        { x: 15, y: 12 },
        { x: 14, y: 12 },
        { x: 13, y: 12 }
    ];
    direction = 0;
    nextDirection = 0;
    score = 0;
    level = 1;
    alive = true;
    paused = false;
    gameOver = false;
    moveInterval = 200;
    spawnFood();
    updateUI();
    statusEl.textContent = '🎮 游戏中';
    statusEl.style.color = '#00ff88';
}

function spawnFood() {
    let free = false;
    while (!free) {
        food = {
            x: Math.floor(Math.random() * COLS),
            y: Math.floor(Math.random() * ROWS)
        };
        free = !snake.some(s => s.x === food.x && s.y === food.y);
    }
}

function updateUI() {
    scoreEl.textContent = score;
    bestEl.textContent = best;
    levelEl.textContent = level;
    const bars = Math.min(level, 10);
    speedEl.textContent = '⚡'.repeat(bars);
}

// 游戏循环
function gameLoop(timestamp) {
    if (gameOver) {
        draw();
        return;
    }
    if (!paused && alive) {
        if (timestamp - lastMoveTime >= moveInterval) {
            lastMoveTime = timestamp;
            move();
        }
    }
    draw();
    animFrameId = requestAnimationFrame(gameLoop);
}

function move() {
    direction = nextDirection;
    const head = snake[0];
    let newHead = { ...head };
    switch (direction) {
        case 0: newHead.x++; break;
        case 1: newHead.y++; break;
        case 2: newHead.x--; break;
        case 3: newHead.y--; break;
    }

    // 撞墙
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        endGame();
        return;
    }
    // 撞自己
    if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
        endGame();
        return;
    }

    snake.unshift(newHead);
    if (newHead.x === food.x && newHead.y === food.y) {
        score += 10 * level;
        if (score > best) {
            best = score;
            localStorage.setItem('snakeBest', best);
        }
        // 升级：每吃5个食物升一级
        if (score % (50 * level) === 0 && level < 10) {
            level++;
            moveInterval = Math.max(50, 200 - (level - 1) * 15);
        }
        spawnFood();
    } else {
        snake.pop();
    }
    updateUI();
}

function endGame() {
    alive = false;
    gameOver = true;
    statusEl.textContent = '💀 游戏结束';
    statusEl.style.color = '#ff4444';
}

function resetGame() {
    if (animFrameId) cancelAnimationFrame(animFrameId);
    initGame();
    lastMoveTime = performance.now();
    animFrameId = requestAnimationFrame(gameLoop);
}

// ============ 绘制 ============
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 网格
    ctx.strokeStyle = '#1a2636';
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.2;
    for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(canvas.width, y * CELL);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // 食物
    // 辉光
    ctx.shadowColor = '#ff4488';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#ff4488';
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 蛇
    for (let i = 0; i < snake.length; i++) {
        const seg = snake[i];
        const alpha = Math.max(0.3, 1 - i * 0.035);
        ctx.globalAlpha = alpha;
        if (i === 0) {
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 8;
        } else {
            ctx.fillStyle = '#00ff88';
            ctx.shadowBlur = 0;
        }
        ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
        if (i === 0) {
            ctx.shadowBlur = 0;
        }
    }
    ctx.globalAlpha = 1;

    // 暂停遮罩
    if (paused) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffaa00';
        ctx.font = 'bold 38px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('⏸ 暂停', canvas.width/2, canvas.height/2 - 10);
        ctx.font = '18px Arial';
        ctx.fillStyle = '#00d9ff';
        ctx.fillText('按 Space 继续', canvas.width/2, canvas.height/2 + 40);
    }

    // 游戏结束遮罩
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 42px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 30);
        ctx.fillStyle = '#ffaa00';
        ctx.font = '24px Arial';
        ctx.fillText(`最终分数: ${score}`, canvas.width/2, canvas.height/2 + 30);
        ctx.fillStyle = '#00ff88';
        ctx.font = '16px Arial';
        ctx.fillText('按 R 重新开始', canvas.width/2, canvas.height/2 + 75);
    }
}

// ============ 键盘控制 ============
document.addEventListener('keydown', (e) => {
    const key = e.key;
    // 防止页面滚动
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','w','W','a','A','s','S','d','D','r','R'].includes(key)) {
        e.preventDefault();
    }

    if (gameOver) {
        if (key === 'r' || key === 'R') resetGame();
        return;
    }

    switch (key) {
        case 'ArrowUp': case 'w': case 'W':
            if (direction !== 1) nextDirection = 3; break;
        case 'ArrowDown': case 's': case 'S':
            if (direction !== 3) nextDirection = 1; break;
        case 'ArrowLeft': case 'a': case 'A':
            if (direction !== 0) nextDirection = 2; break;
        case 'ArrowRight': case 'd': case 'D':
            if (direction !== 2) nextDirection = 0; break;
        case ' ':
            paused = !paused;
            statusEl.textContent = paused ? '⏸ 暂停' : '🎮 游戏中';
            statusEl.style.color = paused ? '#ffaa00' : '#00ff88';
            break;
        case 'r': case 'R':
            resetGame();
            break;
    }
});

// ============ 触摸控制（滑动） ============
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (gameOver) return;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (absDx < 20 && absDy < 20) return; // 太短忽略

    if (absDx > absDy) {
        if (dx > 0 && direction !== 2) nextDirection = 0;
        else if (dx < 0 && direction !== 0) nextDirection = 2;
    } else {
        if (dy > 0 && direction !== 3) nextDirection = 1;
        else if (dy < 0 && direction !== 1) nextDirection = 3;
    }
}, { passive: false });

// ============ 启动 ============
initGame();
lastMoveTime = performance.now();
animFrameId = requestAnimationFrame(gameLoop);
</script>
</body>
</html>
