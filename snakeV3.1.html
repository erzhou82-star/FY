<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>肥杨贪吃蛇</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0e27;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        touch-action: none;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .container {
        display: flex;
        gap: 12px;
        padding: 12px;
        background: #0f1419;
        border-radius: 16px;
        box-shadow: 0 0 30px rgba(0,255,255,0.2);
        width: 100%;
        max-width: 860px;
    }
    .game-area {
        position: relative;
        flex: 1;
        min-width: 0;
    }
    canvas {
        display: block;
        background: linear-gradient(180deg, #0f1419, #1a1f2e);
        border: 2px solid #00ffff;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0,255,255,0.3);
        touch-action: none;
        width: 100% !important;
        height: auto !important;
    }
    .panel {
        width: 210px;
        min-width: 170px;
        background: #1a1f2e;
        border-radius: 12px;
        padding: 14px;
        color: #ccc;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .panel h2 {
        text-align: center;
        color: #00ffff;
        font-size: 19px;
        letter-spacing: 1px;
        text-shadow: 0 0 10px #00ffff;
    }
    .stat-row { display: flex; justify-content: space-between; font-size: 14px; }
    .stat-label { color: #8899aa; }
    .stat-value { font-weight: bold; }
    .score { color: #00ff88; }
    .best  { color: #ffaa00; }
    .level { color: #ff00ff; }
    .speed { color: #00d9ff; }
    .status {
        text-align: center; font-size: 12px;
        padding: 5px; border-radius: 6px;
        background: #0f1419;
    }
    .btn-restart {
        background: transparent; border: 2px solid #00d2ff;
        color: #00d2ff; font-size: 16px;
        padding: 7px 0; border-radius: 30px;
        cursor: pointer; transition: 0.2s; font-weight: bold;
        text-align: center;
    }
    .btn-restart:hover { background: #00d2ff22; }
    .controls { margin-top: auto; font-size: 11px; color: #667788; }
    .controls span { color: #00d9ff; }
    @media (max-width: 540px) {
        .container { flex-direction: column; align-items: center; }
        .panel { width: 96%; max-width: 380px; flex-direction: row; flex-wrap: wrap; gap: 6px; }
        .panel h2 { width: 100%; font-size: 17px; }
        .controls { width: 100%; }
    }
</style>
</head>
<body>
<div class="container">
    <div class="game-area">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div class="panel">
        <h2>🐍 肥杨贪吃蛇</h2>
        <div class="stat-row"><span class="stat-label">分数</span><span class="stat-value score" id="scoreDisplay">0</span></div>
        <div class="stat-row"><span class="stat-label">最高分</span><span class="stat-value best" id="bestDisplay">0</span></div>
        <div class="stat-row"><span class="stat-label">等级</span><span class="stat-value level" id="levelDisplay">1</span></div>
        <div class="stat-row"><span class="stat-label">速度</span><span class="stat-value speed" id="speedDisplay">⚡⚡</span></div>
        <div class="status" id="statusDisplay">🎮 游戏中</div>
        <div class="btn-restart" onclick="resetGame()">🔄 重新开始</div>
        <div class="controls">
            <div>⬆⬇⬅➡ / <span>W A S D</span> 移动</div>
            <div><span>Space</span> 暂停</div>
            <div><span>R</span> 重新开始</div>
            <div style="margin-top:6px;">📱 手机滑动控制</div>
        </div>
    </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ============ 固定网格，自适应格子大小 ============
const COLS = 20;
const ROWS = 15;
let CELL; // 根据画布实际宽高计算

function calcCell() {
    const maxW = window.innerWidth - 24; // 左右padding
    const maxH = window.innerHeight - 24;
    // 桌面时扣除面板宽度
    const isMobile = window.innerWidth <= 540;
    const availW = isMobile ? maxW : maxW - 230;
    const availH = maxH;

    const cellByW = Math.floor(availW / COLS);
    const cellByH = Math.floor(availH / ROWS);
    CELL = Math.min(cellByW, cellByH);
    if (CELL < 10) CELL = 10; // 最小格子

    canvas.width = COLS * CELL;
    canvas.height = ROWS * CELL;
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
}
calcCell();
window.addEventListener('resize', () => {
    calcCell();
    resetGame();
});
window.addEventListener('orientationchange', () => {
    setTimeout(calcCell, 200);
    setTimeout(resetGame, 300);
});

// ============ 游戏核心 ============
let snake = [];
let food = { x: 0, y: 0 };
let direction = 0;
let nextDirection = 0;
let score = 0;
let best = parseInt(localStorage.getItem('snakeBest')) || 0;
let level = 1;
let alive = true;
let paused = false;
let gameOver = false;
let moveInterval = 150; // 初始较快
let lastMoveTime = 0;
let animFrameId = null;

const scoreEl = document.getElementById('scoreDisplay');
const bestEl = document.getElementById('bestDisplay');
const levelEl = document.getElementById('levelDisplay');
const speedEl = document.getElementById('speedDisplay');
const statusEl = document.getElementById('statusDisplay');

function initGame() {
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    snake = [
        { x: cx, y: cy },
        { x: cx - 1, y: cy },
        { x: cx - 2, y: cy }
    ];
    direction = 0;
    nextDirection = 0;
    score = 0;
    level = 1;
    alive = true;
    paused = false;
    gameOver = false;
    moveInterval = 150;
    spawnFood();
    updateUI();
    statusEl.textContent = '🎮 游戏中';
    statusEl.style.color = '#00ff88';
}

function spawnFood() {
    let ok = false;
    while (!ok) {
        food = {
            x: Math.floor(Math.random() * COLS),
            y: Math.floor(Math.random() * ROWS)
        };
        ok = !snake.some(s => s.x === food.x && s.y === food.y);
    }
}

function updateUI() {
    scoreEl.textContent = score;
    bestEl.textContent = best;
    levelEl.textContent = level;
    const bars = Math.min(level, 10);
    speedEl.textContent = '⚡'.repeat(bars);
}

function move() {
    direction = nextDirection;
    const head = snake[0];
    let nh = { ...head };
    switch (direction) {
        case 0: nh.x++; break;
        case 1: nh.y++; break;
        case 2: nh.x--; break;
        case 3: nh.y--; break;
    }

    if (nh.x < 0 || nh.x >= COLS || nh.y < 0 || nh.y >= ROWS) { endGame(); return; }
    if (snake.some(s => s.x === nh.x && s.y === nh.y)) { endGame(); return; }

    snake.unshift(nh);
    if (nh.x === food.x && nh.y === food.y) {
        score += 10 * level;
        if (score > best) { best = score; localStorage.setItem('snakeBest', best); }
        // 每吃3个食物升一级，更快提速
        if (score % (30 * level) === 0 && level < 10) {
            level++;
            moveInterval = Math.max(50, 150 - (level - 1) * 12);
        }
        spawnFood();
    } else {
        snake.pop();
    }
    updateUI();
}

function endGame() {
    alive = false;
    gameOver = true;
    statusEl.textContent = '💀 游戏结束';
    statusEl.style.color = '#ff4444';
}

function resetGame() {
    if (animFrameId) cancelAnimationFrame(animFrameId);
    initGame();
    lastMoveTime = performance.now();
    animFrameId = requestAnimationFrame(gameLoop);
}

// ============ 绘制 ============
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 网格
    ctx.strokeStyle = '#1a2636';
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.2;
    for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // 食物
    ctx.shadowColor = '#ff4488'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#ff4488';
    ctx.beginPath();
    ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-1, 0, Math.PI*2);
    ctx.fill();    ctx.shadowBlur = 0;

    // 蛇
    for (let i = 0; i < snake.length; i++) {
        const s = snake[i];
        const a = Math.max(0.3, 1 - i*0.045);
        ctx.globalAlpha = a;
        if (i === 0) {
            ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 8;
        } else {
            ctx.fillStyle = '#00ff88'; ctx.shadowBlur = 0;
        }
        ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    if (paused) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#ffaa00'; ctx.font = 'bold 38px Arial'; ctx.textAlign = 'center';
        ctx.fillText('⏸ 暂停', canvas.width/2, canvas.height/2 - 10);
        ctx.font = '18px Arial'; ctx.fillStyle = '#00d9ff';
        ctx.fillText('按 Space 继续', canvas.width/2, canvas.height/2 + 40);
    }

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#ff4444'; ctx.font = 'bold 42px Arial'; ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 30);
        ctx.fillStyle = '#ffaa00'; ctx.font = '24px Arial';
        ctx.fillText(`最终分数: ${score}`, canvas.width/2, canvas.height/2 + 30);
        ctx.fillStyle = '#00ff88'; ctx.font = '16px Arial';
        ctx.fillText('按 R 重新开始', canvas.width/2, canvas.height/2 + 75);
    }
}

// ============ 循环 ============
function gameLoop(ts) {
    if (gameOver) { draw(); return; }
    if (!paused && alive && ts - lastMoveTime >= moveInterval) {
        lastMoveTime = ts;
        move();
    }
    draw();
    animFrameId = requestAnimationFrame(gameLoop);
}

// ============ 键盘 ============
document.addEventListener('keydown', e => {
    const k = e.key;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','w','W','a','A','s','S','d','D','r','R'].includes(k)) e.preventDefault();
    if (gameOver) { if (k==='r'||k==='R') resetGame(); return; }
    switch(k) {
        case 'ArrowUp': case 'w': case 'W': if(direction!==1) nextDirection=3; break;
        case 'ArrowDown': case 's': case 'S': if(direction!==3) nextDirection=1; break;
        case 'ArrowLeft': case 'a': case 'A': if(direction!==0) nextDirection=2; break;
        case 'ArrowRight': case 'd': case 'D': if(direction!==2) nextDirection=0; break;
        case ' ': paused=!paused;
            statusEl.textContent=paused?'⏸ 暂停':'🎮 游戏中';
            statusEl.style.color=paused?'#ffaa00':'#00ff88'; break;
        case 'r': case 'R': resetGame(); break;
    }
});

// ============ 触摸 ============
let tx=0,ty=0;
canvas.addEventListener('touchstart', e=>{e.preventDefault();const t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:false});
canvas.addEventListener('touchmove', e=>e.preventDefault(),{passive:false});
canvas.addEventListener('touchend', e=>{
    if(gameOver) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-tx, dy=t.clientY-ty;
    if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
    if(Math.abs(dx)>Math.abs(dy)){
        if(dx>0&&direction!==2) nextDirection=0;
        else if(dx<0&&direction!==0) nextDirection=2;
    } else {
        if(dy>0&&direction!==3) nextDirection=1;
        else if(dy<0&&direction!==1) nextDirection=3;
    }
},{passive:false});

// ============ 启动 ============
initGame();
lastMoveTime = performance.now();
animFrameId = requestAnimationFrame(gameLoop);
</script>
</body>
</html>
